services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentwise-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://host.docker.internal:8000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
